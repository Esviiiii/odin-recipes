<!DOCTYPE html>

    <title>Deviled Egg</title>
</head>
<body>
    <h1>Deviled Egg Recipe</h1>
    <img src="../pictures/deviledEgg.png" alt="Deviled Egg" height="310" width="310">
    <ul>
        <li>6 large hard-boiled eggs</li>
        <li>3 tablespoons mayonnaise</li>
        <li>2 1/2 tablespoons chili crisp, such as Lao Gan Ma Spicy Chili Crisp®, divided</li>
        <li>1 teaspoon seasoned rice vinegar</li>
        <li>1/4 teaspoon dry mustard</li>
        <li>salt to taste</li>
        <li>1 green onion, chopped</li>
    </ul>


</body>
